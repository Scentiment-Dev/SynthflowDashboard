name: Contract Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install test dependencies
        run: python -m pip install pytest jsonschema
      - name: Run contract tests
        run: pytest tests/contracts
