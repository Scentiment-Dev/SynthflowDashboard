name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repo-validation:
    name: Repo validation and no-drift gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required structure
        run: python -S scripts/validate_repo_structure.py
      - name: Validate no-drift anchors
        run: python -S scripts/validate_no_drift_rules.py
      - name: Validate Wave 8 agent system
        run: python -S scripts/validate_wave8_agent_system.py
      - name: Validate Wave 9 QA/CI layer
        run: python -S scripts/validate_wave9_qa_ci.py
      - name: Generate repo manifest
        run: python -S scripts/generate_repo_manifest.py

  backend-tests:
    uses: ./.github/workflows/backend-tests.yml

  ingestion-tests:
    uses: ./.github/workflows/ingestion-tests.yml

  frontend-tests:
    uses: ./.github/workflows/frontend-tests.yml

  dbt-tests:
    uses: ./.github/workflows/dbt-tests.yml

  contract-tests:
    uses: ./.github/workflows/contract-tests.yml

  smoke-tests:
    uses: ./.github/workflows/smoke-tests.yml

  coverage-codecov:
    name: Coverage and Codecov Upload
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install -e "./services/analytics-api[dev]"
      - name: Install ingestion dependencies
        run: python -m pip install -e "./services/ingestion-worker[dev]"
      - name: Install contract test dependencies
        run: python -m pip install pytest jsonschema pytest-cov
      - name: Run coverage gate
        run: pytest services/analytics-api/tests tests/contracts tests/integration --cov=services/analytics-api --cov=packages/shared-contracts --cov-report=term-missing --cov-report=xml --cov-fail-under=95
      - name: Run ingestion coverage for Codecov artifact completeness
        run: pytest services/ingestion-worker/tests --cov=services/ingestion-worker --cov-report=term-missing --cov-report=xml:coverage-ingestion.xml
      - name: Upload coverage to Codecov (attempt 1)
        id: codecov_upload_1
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: ./coverage.xml,./coverage-ingestion.xml
          fail_ci_if_error: true
          use_oidc: true
          use_legacy_upload_endpoint: true
      - name: Upload coverage to Codecov (attempt 2)
        id: codecov_upload_2
        if: steps.codecov_upload_1.outcome == 'failure'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: ./coverage.xml,./coverage-ingestion.xml
          fail_ci_if_error: true
          use_oidc: true
          use_legacy_upload_endpoint: true
      - name: Upload coverage to Codecov (attempt 3)
        id: codecov_upload_3
        if: steps.codecov_upload_1.outcome == 'failure' && steps.codecov_upload_2.outcome == 'failure'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: ./coverage.xml,./coverage-ingestion.xml
          fail_ci_if_error: true
          use_oidc: true
          use_legacy_upload_endpoint: true
      - name: Fail if all Codecov upload attempts failed
        if: steps.codecov_upload_1.outcome == 'failure' && steps.codecov_upload_2.outcome == 'failure' && steps.codecov_upload_3.outcome == 'failure'
        run: |
          echo "Codecov upload failed on all retry attempts."
          exit 1
