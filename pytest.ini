[pytest]
minversion = 8.0
testpaths =
    tests
pythonpath =
    services/analytics-api
    services/ingestion-worker
    .
addopts = -q
markers =
    contract: cross-service API/event contract checks
    smoke: local smoke tests that can run without external vendor credentials
    integration: local integration skeleton checks
    no_drift: tests that lock source-of-truth and governance rules
