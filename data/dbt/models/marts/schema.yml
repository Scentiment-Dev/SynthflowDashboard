version: 2
models:
  - name: fact_subscription_journey
    description: One row per subscription journey for dashboard module summaries.
    columns:
      - name: journey_id
        tests: [not_null, unique]
  - name: fact_subscription_outcome
    description: Official subscription outcome fact. Save/cancel outcomes are only true with Stay.ai confirmation.
  - name: fact_cancellation_retention_journey
    description: Cancellation and retention journey fact with Cost Too High offer sequence checks.
  - name: mart_subscription_analytics
    description: Subscription handling mart for non-cancellation and portal handoff analytics.
  - name: mart_retention_analytics
    description: Cancellation and retention mart for save rate, cancellation rate, and offer funnel analytics.
  - name: mart_order_status_analytics
    description: Order status analytics mart using Shopify source-of-truth context.
  - name: mart_escalation_analytics
    description: Escalation analytics mart using live-agent/RingCX events where integrated.
  - name: mart_handoff_completion
    description: Handoff and portal completion mart. Link sent is diagnostic only.
  - name: mart_source_freshness
    description: Data freshness mart visible to data quality and governance dashboards.
  - name: mart_trust_label_audit
    description: Audit mart proving trust labels are system-calculated.
