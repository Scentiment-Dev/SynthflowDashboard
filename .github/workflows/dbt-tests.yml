name: dbt Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  dbt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data/dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dbt dependencies
        run: python -m pip install 'dbt-core>=1.8' 'dbt-postgres>=1.8'
      - name: dbt parse
        run: dbt parse --profiles-dir .
      - name: dbt list nodes
        run: dbt ls --profiles-dir .
      - name: dbt test execution note
        run: echo "This workflow validates dbt parse/list only. Warehouse-integrated dbt test runs in environment-coupled pipelines."
