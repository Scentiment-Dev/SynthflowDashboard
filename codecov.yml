coverage:
  precision: 2
  round: down
  range: "95...100"
  status:
    project:
      default:
        target: 95%
        threshold: 0%
        if_ci_failed: error
    patch:
      default:
        target: 95%
        threshold: 0%
        if_ci_failed: error
comment:
  layout: "reach,diff,flags,tree,footer"
  behavior: default
github_checks:
  annotations: true
