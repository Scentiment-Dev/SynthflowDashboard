name: dbt Tests

on:
  workflow_call:
  pull_request:
    paths:
      - 'data/dbt/**'
      - 'data/warehouse/**'
      - 'packages/shared-contracts/**'
      - '.github/workflows/dbt-tests.yml'

permissions:
  contents: read

jobs:
  dbt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data/dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dbt dependencies
        run: python -m pip install 'dbt-core>=1.8' 'dbt-postgres>=1.8'
      - name: dbt parse
        run: dbt parse --profiles-dir .
      - name: dbt tests
        run: dbt test --profiles-dir .
