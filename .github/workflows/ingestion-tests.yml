name: Ingestion Worker Tests

on:
  workflow_call:
  pull_request:
    paths:
      - 'services/ingestion-worker/**'
      - 'packages/shared-contracts/**'
      - 'tests/contracts/**'
      - '.github/workflows/ingestion-tests.yml'

permissions:
  contents: read

jobs:
  ingestion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install ingestion dependencies
        run: python -m pip install -e '.[dev]'
      - name: Lint ingestion worker
        run: ruff check app tests
      - name: Typecheck ingestion worker
        run: mypy app
      - name: Run ingestion tests
        run: pytest
